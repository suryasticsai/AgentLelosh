name: Build TWA APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Pre-configured Bubblewrap Docker image with all dependencies
      image: ghcr.io/googlechromelabs/bubblewrap:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create manifest.json if missing
        run: |
          if [ ! -f manifest.json ]; then
            cat > manifest.json << 'EOF'
          {
            "name": "AgentLelosh",
            "short_name": "AgentLelosh",
            "description": "Your Personal Voice Agent",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#1e1e24",
            "theme_color": "#1e1e24",
            "icons": [
              {
                "src": "logo/logo-black.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          EOF
          fi

      - name: Initialize TWA project
        run: |
          bubblewrap init \
            --manifest manifest.json \
            --packageId com.suryasticsai.agentlelosch \
            --appName "AgentLelosh"

      - name: Build APK
        run: bubblewrap build

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh-TWA
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Release (if tag)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
