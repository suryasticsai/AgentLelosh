name: Build TWA APK

on:
  push:
    branches: [ main ]
    # If you push a tag (e.g., v1.0.0), the workflow will also run and attach the APK to the release.
    tags:
      - 'v*'
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate TWA project from your PWA manifest
        run: |
          # Bubblewrap will fetch manifest.json from your GitHub Pages URL.
          # Make sure it exists and is accessible.
          bubblewrap init --manifest https://suryasticsai.github.io/AgentLelosh/manifest.json

      - name: Build the APK (debug)
        run: bubblewrap build

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh-TWA
          path: app/build/outputs/apk/debug/app-debug.apk

      # Optional: if you push a tag (e.g., git tag v1.0.0 && git push --tags),
      # this step creates a GitHub Release and attaches the APK to it.
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
