name: Build TWA APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install Android SDK and tools
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install Bubblewrap
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Generate TWA project with explicit package name and app name
      - name: Generate TWA project
        run: |
          bubblewrap init \
            --manifest manifest.json \
            --packageId com.suryasticsai.agentlelosch \
            --appName "AgentLelosh"

      # Build debug APK (skip signing for debug)
      - name: Build APK
        run: bubblewrap build

      # Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh-TWA
          path: app/build/outputs/apk/debug/app-debug.apk

      # Release upload if tag
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
