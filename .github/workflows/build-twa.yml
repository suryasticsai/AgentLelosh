name: Build APK from PWA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # This action builds the APK from your manifest
      - name: Build APK
        uses: sharadcodes/pwa-to-apk-action@v1.0.0
        with:
          project-root-folder: ./
          app-name: AgentLelosh
          package-name: com.suryasticsai.agentlelosch
          app-icon: logo/logo-black.png
          app-version: 1.0.0
          build-output: app-debug.apk

      # Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh
          path: app-debug.apk

      # Upload to Release (if tag)
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app-debug.apk
          generate_release_notes: true
