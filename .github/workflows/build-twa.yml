name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate TWA project from your PWA manifest
        run: |
          bubblewrap init --manifest https://suryasticsai.github.io/AgentLelosh/manifest.json
          # The manifest is at that URL – if you don't have one, create a simple one.

      - name: Build the APK (debug)
        run: bubblewrap build

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh-TWA
          path: app/build/outputs/apk/debug/app-debug.apk
