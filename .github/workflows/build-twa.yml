name: Build APK from PWA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install Bubblewrap CLI (required by the action)
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Generate Android project from manifest
      - name: Generate Android project
        run: |
          bubblewrap init \
            --manifest manifest.json \
            --packageId com.suryasticsai.agentlelosch \
            --appName "AgentLelosh"

      # Build APK using the PWA to APK action
      - name: Build APK
        uses: sharadcodes/pwa-to-apk-action@v1.0.0
        with:
          project-root-folder: ./app

      # Upload the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AgentLelosh
          path: app/build/outputs/apk/debug/app-debug.apk

      # Upload to Release (if tag pushed)
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
